name: Dependency Updates

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Update Python dependencies
      run: |
        cd be
        pip install --upgrade pip pip-tools
        pip-compile --upgrade requirements.in || echo "requirements.in not found, skipping Python dependency update"

    - name: Update Node.js dependencies
      run: |
        cd fe
        npm update
        npm audit fix || true

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update dependencies'
        title: 'chore: automated dependency updates'
        body: |
          ## Automated Dependency Updates
          
          This PR contains automated dependency updates:
          
          ### Backend (Python)
          - Updated Python packages to latest compatible versions
          
          ### Frontend (Node.js)
          - Updated npm packages to latest versions
          - Applied security fixes where available
          
          ### Review Checklist
          - [ ] Check for breaking changes in updated packages
          - [ ] Run tests locally to ensure compatibility
          - [ ] Review security advisory fixes
          
          Generated by GitHub Actions workflow.
        branch: chore/dependency-updates
        delete-branch: true
