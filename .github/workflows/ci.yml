name: CI Pipeline

on:
  push:
    branches: [ main, develop, frontend-cleaning]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-frontend
  IMAGE_NAME_BACKEND: ${{ github.repository }}-backend

jobs:
  # Job 1: Test Backend
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./be
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Create test environment file
      run: |
        echo "DATABASE_URL=sqlite:///./test.db" > .env
        echo "OPENAI_API_KEY=test_key" >> .env
        echo "YOUTUBE_API_KEY=test_key" >> .env
        echo "GOOGLE_BOOKS_API_KEY=test_key" >> .env
        echo "SPOTIFY_CLIENT_ID=test_id" >> .env
        echo "SPOTIFY_CLIENT_SECRET=test_secret" >> .env
        

    - name: Run linting (flake8)
      run: |
        pip install flake8
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run backend tests
      run: |
        # Skip tests for now since they're not implemented yet
        echo "Backend tests not implemented yet - skipping"
        # TODO: Implement proper tests and uncomment the line below
        # python -m pytest tests/ -v

  # Job 2: Test Frontend
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./fe
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './fe/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Create environment file
      run: |
        echo "NEXT_PUBLIC_API_URL=http://localhost:8001" > .env

    - name: Run linting
      run: npm run lint

    - name: Run type checking
      run: npx tsc --noEmit

    - name: Build frontend
      run: npm run build

    - name: Run frontend tests
      run: npm test || echo "Tests not configured yet"

  # Job 3: Build and Push Docker Images
  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract metadata for backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Extract metadata for frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./be
        file: ./be/Dockerfile
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./fe
        file: ./fe/Dockerfile
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Job 4: Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner for backend
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './be'
        format: 'sarif'
        output: 'trivy-backend-results.sarif'

    - name: Run Trivy vulnerability scanner for frontend
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './fe'
        format: 'sarif'
        output: 'trivy-frontend-results.sarif'

    # - name: Upload Trivy scan results to GitHub Security tab
    #   uses: github/codeql-action/upload-sarif@v3
    #   if: always()
    #   with:
    #     sarif_file: 'trivy-backend-results.sarif'

    # - name: Upload Trivy scan results to GitHub Security tab
    #   uses: github/codeql-action/upload-sarif@v3
    #   if: always()
    #   with:
    #     sarif_file: 'trivy-frontend-results.sarif'

  # Job 5: Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Prepare environment variables and files
      run: |
        # 1. Set shell environment variables for the PostgreSQL service
        # These are read by docker-compose to configure the 'postgres_db' service.
        echo "## Setting Shell ENV for Docker Compose ##"
        echo "POSTGRES_USER=testuser" >> $GITHUB_ENV
        echo "POSTGRES_PASSWORD=testpass" >> $GITHUB_ENV
        echo "POSTGRES_DB=testdb" >> $GITHUB_ENV

        # 2. Create environment file for Backend (./be/.env)
        # This file is loaded by the 'backend' and 'celery' services via the 'env_file' directive.
        echo "## Creating ./be/.env file ##"
        mkdir -p ./be
        cat <<EOF > ./be/.env
        DATABASE_URL=postgresql://testuser:testpass@postgres_db:5432/testdb
        SECRET_KEY=a-very-secret-key-for-ci-testing-only-change-in-prod
        CELERY_BROKER_URL=redis://redis:6379/0
        CELERY_RESULT_BACKEND=redis://redis:6379/0
        CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
        OPENAI_API_KEY=test_key
        YOUTUBE_API_KEY=test_key
        GOOGLE_BOOKS_API_KEY=test_key
        SPOTIFY_CLIENT_ID=test_id
        SPOTIFY_CLIENT_SECRET=test_secret
        FRONTEND_URL=http://localhost:3000
        WEBSOCKET_URL=ws://localhost:8001/api/v1/notifications/ws/notifications
        EOF

        # 3. Create environment file for Frontend (./fe/.env)
        # This file is loaded by the 'frontend' service via the 'env_file' directive.
        echo "## Creating ./fe/.env file ##"
        mkdir -p ./fe
        cat <<EOF > ./fe/.env
        NEXT_PUBLIC_API_URL=http://localhost:8001
        NEXT_PUBLIC_WEBSOCKET_URL=ws://localhost:8001/api/v1/notifications/ws/notifications
        NEXT_PUBLIC_WS_URL=ws://localhost:8001/api/v1/notifications/ws/notifications
        NODE_ENV=development
        EOF

        # Create a dummy GCP credentials file as required by the volume mount
        echo '{}' > ./be/gcp-credentials.json
        
        echo "Environment setup complete."

    - name: Build and run services
      run: |
        docker compose up -d --build
        
        # Wait for services to be ready
        echo "Waiting for services to be ready..."
        timeout 180 bash -c 'until curl -fs http://localhost:8001/docs; do echo "Waiting for backend..."; sleep 5; done'
        timeout 180 bash -c 'until curl -fs http://localhost:3000; do echo "Waiting for frontend..."; sleep 5; done'

    - name: Check running containers and run tests
      run: |
        echo "--- Docker PS ---"
        docker compose ps
        echo "--- Docker Logs ---"
        docker compose logs
        echo "-------------------"
        
        echo "Testing frontend accessibility..."
        curl -f http://localhost:3000 || exit 1
        
        echo "Testing API docs endpoint..."
        curl -f http://localhost:8001/docs || exit 1
        
        echo "Basic integration tests passed successfully! ✅"

    - name: Cleanup
      if: always()
      run: docker compose down -v --remove-orphans